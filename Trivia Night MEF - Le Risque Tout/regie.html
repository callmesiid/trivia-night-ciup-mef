<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RÉGIE - MEF TRIVIA</title>
    <link rel="stylesheet" href="style_mix.css"> 
    <style>
        /* CSS SPÉCIFIQUE RÉGIE */
        body {
            background-color: #121212;
            color: #ecf0f1;
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 15px;
            display: grid;
            grid-template-columns: 380px 1fr; /* Colonne gauche un peu plus large */
            gap: 20px;
            height: 95vh;
            overflow: hidden;
        }

        /* PANNEAUX */
        .panel {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 15px;
            display: flex; flex-direction: column; gap: 10px;
            position: relative;
        }
        
        .disabled-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 10;
            display: flex; align-items: center; justify-content: center;
            color: #aaa; font-style: italic; border-radius: 8px; text-align: center; padding: 20px;
        }
        .hidden { display: none !important; }

        h3 {
            font-family: 'Anton', sans-serif; color: #d4af37;
            margin: 0 0 5px 0; border-bottom: 1px solid #444; padding-bottom: 5px;
            font-size: 1.1em; letter-spacing: 1px;
        }

        /* BOUTONS */
        button {
            padding: 8px 12px; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            transition: 0.2s; color: white; background: #333; border: 1px solid #555;
        }
        button:hover:not(:disabled) { filter: brightness(1.2); border-color: #fff; }
        button:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        .btn-action { background: #2980b9; border: none; }
        .btn-valid { background: #27ae60; border: none; }
        .btn-danger { background: #c0392b; border: none; }
        .btn-warn { background: #f1c40f; color: black; border: none; }
        .btn-purple { background: #8e44ad; border: none; }
        .btn-icon { padding: 4px 8px; font-size: 0.8em; margin-left: 2px; }

        /* LISTE ÉQUIPES */
        #teams-list-container { flex: 1; overflow-y: auto; min-height: 150px; background: #111; border: 1px solid #444; padding: 5px; }
        .team-row {
            display: flex; align-items: center; gap: 5px;
            background: #222; padding: 5px; margin-bottom: 3px; border-radius: 3px;
        }
        .team-row.active { border: 1px solid #f1c40f; background: #332b00; }
        .team-name { flex: 1; font-weight: bold; font-size: 0.9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .team-score { color: #f1c40f; font-family: monospace; font-size: 1.1em; margin-right: 5px; min-width: 30px; text-align: right;}
        
        /* Input score manuel */
        .score-edit-input { width: 50px; background: #000; color: white; border: 1px solid #f1c40f; text-align: center; }

        /* GRILLE */
        #grid-container {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            overflow-y: auto; padding: 5px; flex: 1;
        }
        .grid-cell {
            background: #2c3e50; border: 1px solid #444; padding: 10px;
            text-align: center; cursor: pointer; min-height: 60px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 4px; transition: 0.2s;
        }
        .grid-cell:hover { background: #34495e; border-color: #f1c40f; }
        .grid-cell.mystery { background: #8e44ad; border-color: #9b59b6; }
        .grid-cell.used { background: #000; color: #444; border-color: #222; pointer-events: none; }
        .grid-cell.selected { background: #d35400; color: white; border: 2px solid #f1c40f; }
        
        .cell-theme { font-size: 0.75em; text-transform: uppercase; margin-bottom: 2px; }
        .cell-points { font-size: 1.3em; font-weight: bold; color: #f1c40f; }

        /* MODALE QUESTION */
        #question-panel {
            background: #2c0000; border: 2px solid #c0392b; 
            padding: 15px; margin-bottom: 15px; display: none;
        }
        .q-text { color: #fff; font-size: 1.1em; margin-bottom: 5px; }
        .a-text { color: #f1c40f; font-weight: bold; font-size: 1.2em; margin-bottom: 15px; padding: 5px; background: rgba(0,0,0,0.3); }

        /* LOGS */
        #logs-container {
            height: 150px; overflow-y: auto; background: #000; 
            border: 1px solid #333; padding: 5px; font-family: monospace; font-size: 0.8em; color: #aaa;
        }
        .log-entry { margin-bottom: 2px; border-bottom: 1px solid #222; }
        .log-time { color: #555; margin-right: 5px; }
        .log-good { color: #27ae60; }
        .log-bad { color: #c0392b; }
        .log-edit { color: #3498db; }

    </style>
</head>
<body>

    <aside style="display: flex; flex-direction: column; gap: 10px;">
        
        <button class="btn-action" onclick="window.open('ecran_jeu.html', 'EcranJeu', 'width=1280,height=720')">📺 OUVRIR ÉCRAN JEU</button>
        <button id="btn-mode-rt" onclick="(function(){const c=localStorage.getItem('rt_mode')||'normal';localStorage.setItem('rt_mode',c==='normal'?'custom':'normal');document.getElementById('mode-label-rt').textContent=localStorage.getItem('rt_mode')==='custom'?'◉ PERSONNALISÉ':'◉ NORMAL';document.getElementById('btn-mode-rt').style.color=localStorage.getItem('rt_mode')==='custom'?'#d4af37':'#888';document.getElementById('btn-mode-rt').style.borderColor=localStorage.getItem('rt_mode')==='custom'?'#d4af37':'#444';alert('Rechargez l\'écran de jeu pour appliquer le changement.');})();" style="width:100%;margin-top:4px;background:#1a1a1a;border:1px solid #444;color:#888;padding:5px;font-family:'Bebas Neue';font-size:.82rem;letter-spacing:1px;cursor:pointer;border-radius:3px;" title="Basculer entre base normale et base personnalisée">MODE: <span id="mode-label-rt">◉ NORMAL</span></button>
        <script>
        (function(){ const m=localStorage.getItem('rt_mode')||'normal'; const l=document.getElementById('mode-label-rt'); const b=document.getElementById('btn-mode-rt'); if(!l)return; l.textContent=m==='custom'?'◉ PERSONNALISÉ':'◉ NORMAL'; if(m==='custom'){b.style.color='#d4af37';b.style.borderColor='#d4af37';} })();
        </script>

        <div class="panel">
            <div id="overlay-config" class="disabled-overlay">Validez les équipes</div>
            <h3>1. CONFIGURATION</h3>
            <div style="display:flex; gap:5px;">
                <button class="btn-warn" style="flex:1" onclick="send('START_INTRO')">▶ INTRO</button>
                <button class="btn-danger" style="flex:1" onclick="send('SKIP_INTRO')">⏭ SKIP</button>
            </div>
            <div style="margin-top:10px; display:flex; gap:2px;">
                <button id="mode-normal" style="flex:1; font-size:0.7em" onclick="setMode('NORMAL')">Normal</button>
                <button id="mode-quick" style="flex:1; font-size:0.7em" onclick="setMode('QUICK')">Rapide</button>
                <button id="mode-hard" style="flex:1; font-size:0.7em" onclick="setMode('HARD')">Hard</button>
            </div>
        </div>

        <div class="panel" style="flex:1;">
            <h3>2. ÉQUIPES & SCORES</h3>
            
            <div id="team-edit-area">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="new-team-input" placeholder="Nom Équipe" style="flex:1; padding:5px; background:#333; border:1px solid #555; color:white;">
                    <button class="btn-valid" onclick="addTeam()">+</button>
                </div>
                <button class="btn-warn" style="width:100%; margin-top:5px;" onclick="validateTeams()">🔒 VALIDER LISTE</button>
            </div>

            <div id="teams-list-container"></div>

            <div id="team-game-controls" class="hidden" style="margin-top:5px;">
                <div style="background:#222; padding:5px; text-align:center; border:1px solid #444; margin-bottom:5px;">
                    <small style="color:#aaa">JOUEUR ACTIF</small><br>
                    <strong id="active-team-display" style="font-size:1.2em; color:#f1c40f">---</strong>
                    <div style="font-size:0.7em; color:#888; margin-top:3px;">
                        Direction: <span id="snake-dir-display" style="color:#f1c40f; font-weight:bold;">→</span>
                    </div>
                </div>
                <div style="display:flex; gap:5px;">
                    <button style="flex:1" onclick="prevTurn()">⬅</button>
                    <button style="flex:1" onclick="nextTurn()">➡</button>
                </div>
                <button class="btn-warn" style="width:100%; margin-top:5px; font-size:0.75em;" id="btn-undo-score" onclick="undoLastScore()" disabled>↩ ANNULER DERNIER SCORE</button>
                <button class="btn-danger" style="width:100%; margin-top:5px; font-size:0.8em;" onclick="unlockTeams()">🔓 MODIFIER ÉQUIPES</button>
            </div>
        </div>

        <div class="panel">
            <h3>HISTORIQUE / LOGS</h3>
            <div id="logs-container"></div>
        </div>

    </aside>

    <main style="display: flex; flex-direction: column;">
        
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <div class="panel" style="flex:1; margin:0; flex-direction:row; align-items:center;">
                <div id="overlay-launch" class="disabled-overlay" style="padding:0; background:rgba(0,0,0,0.6)">Attente config</div>
                <button class="btn-valid" style="flex:1; height:100%;" onclick="send('TRIGGER_SPIN')">🎡 LANCER TIRAGE</button>
                <button class="btn-action" style="flex:1; height:100%;" onclick="send('FORCE_START_BOARD')">➡️ AFFICHER GRILLE</button>
            </div>
            <div class="panel" style="width:150px; margin:0; justify-content:center;">
                 <button class="btn-warn" onclick="sendScores()">🏆 PODIUM</button>
            </div>
        </div>

        <div id="question-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h2 style="margin:0; color:#c0392b;">🔴 EN DIRECT</h2>
                <button class="btn-purple" onclick="rerollQuestion()" title="Changer la question pour ce bucket">♻️ CHANGER QUESTION</button>
            </div>

            <div style="background:black; padding:10px; border-radius:4px; margin-bottom:10px;">
                <div style="color:#aaa; font-size:0.8em;">QUESTION :</div>
                <div id="q-text-display" class="q-text">...</div>
                <div style="color:#aaa; font-size:0.8em; margin-top:10px;">RÉPONSE :</div>
                <div id="a-text-display" class="a-text">...</div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <button class="btn-action" id="btn-reveal" onclick="revealAnswer()">1. RÉVÉLER</button>
                <button class="btn-valid" id="btn-true" disabled onclick="validate(true)">2. VRAI (+PTS)</button>
                <button class="btn-danger" id="btn-false" disabled onclick="validate(false)">2. FAUX (-PTS)</button>
            </div>
            <button style="width:100%; margin-top:10px; background:#444;" onclick="cancelQuestion()">ANNULER (Retour Grille)</button>
        </div>

        <div class="panel" style="flex:1; overflow:hidden;">
            <div id="overlay-grid" class="disabled-overlay">En attente de la synchronisation...</div>
            <h3>GRILLE DE JEU <span id="grid-status" style="font-size:0.8em; color:#aaa;"></span></h3>
            <div id="grid-container"></div>
        </div>

    </main>

    <script>
        const channel = new BroadcastChannel('buckets_channel');

        // --- ETAT GLOBAL ---
        let teams = [{ name: "Equipe 1", score: 0 }, { name: "Equipe 2", score: 0 }];
        let activeTeamIndex = 0;
        let snakeDirection = 1; 
        
        let isTeamsValidated = false;
        let isAnimating = false;
        let currentBucketId = null;
        let bucketsMap = {};
        let lastScoreAction = null; // pour le undo score

        // --- LOGS ---
        function addLog(text, type='neutral') {
            const container = document.getElementById('logs-container');
            const div = document.createElement('div');
            div.className = 'log-entry';
            
            let colorClass = '';
            if(type === 'good') colorClass = 'log-good';
            if(type === 'bad') colorClass = 'log-bad';
            if(type === 'edit') colorClass = 'log-edit';

            const time = new Date().toLocaleTimeString().substring(0,5);
            div.innerHTML = `<span class="log-time">[${time}]</span> <span class="${colorClass}">${text}</span>`;
            
            container.prepend(div);
        }

        // --- 1. GESTION ÉQUIPES ---
        function renderTeamsList() {
            const container = document.getElementById('teams-list-container');
            container.innerHTML = "";
            
            teams.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = `team-row ${isTeamsValidated && i === activeTeamIndex ? 'active' : ''}`;
                
                if(!isTeamsValidated) {
                    div.innerHTML = `
                        <span class="team-name">${i+1}. ${t.name}</span>
                        <button class="btn-icon" onclick="moveTeam(${i}, -1)">⬆</button>
                        <button class="btn-icon" onclick="moveTeam(${i}, 1)">⬇</button>
                        <button class="btn-icon btn-danger" onclick="removeTeam(${i})">✖</button>
                    `;
                } else {
                    // Mode Jeu avec Édition Score
                    div.innerHTML = `
                        <span class="team-name">${i+1}. ${t.name}</span>
                        <span class="team-score" id="score-val-${i}">${t.score}</span>
                        <button class="btn-icon" onclick="toggleEditScore(${i})" title="Modifier Score">✎</button>
                    `;
                }
                container.appendChild(div);
            });

            if(isTeamsValidated && teams.length > 0) {
                document.getElementById('active-team-display').innerText = teams[activeTeamIndex].name;
            }
        }

        function toggleEditScore(index) {
            const span = document.getElementById(`score-val-${index}`);
            const currentScore = teams[index].score;
            
            // Transforme en input
            const input = document.createElement('input');
            input.type = 'number';
            input.value = currentScore;
            input.className = 'score-edit-input';
            
            input.onblur = () => saveScore(index, input.value);
            input.onkeydown = (e) => { if(e.key === 'Enter') saveScore(index, input.value); };

            span.replaceWith(input);
            input.focus();
        }

        function saveScore(index, newVal) {
            const old = teams[index].score;
            const n = parseInt(newVal);
            if(!isNaN(n)) {
                teams[index].score = n;
                addLog(`Correction Score ${teams[index].name}: ${old} -> ${n}`, 'edit');
                // Envoie update discret à l'écran si nécessaire (pas implémenté, l'écran update sur les actions)
                // Mais pour être sûr :
                // send('UPDATE_SCORES_SILENT', { teams: teams }); 
            }
            renderTeamsList();
        }

        function addTeam() {
            const input = document.getElementById('new-team-input');
            if(input.value.trim()) {
                teams.push({ name: input.value.trim(), score: 0 });
                input.value = "";
                renderTeamsList();
            }
        }

        function removeTeam(index) {
            if(confirm("Supprimer ?")) { teams.splice(index, 1); renderTeamsList(); }
        }
        function moveTeam(i, d) {
            if(i+d < 0 || i+d >= teams.length) return;
            [teams[i], teams[i+d]] = [teams[i+d], teams[i]];
            renderTeamsList();
        }

        function validateTeams() {
            if(teams.length === 0) return alert("Aucune équipe !");
            isTeamsValidated = true;
            document.getElementById('team-edit-area').classList.add('hidden');
            document.getElementById('team-game-controls').classList.remove('hidden');
            document.getElementById('overlay-config').classList.add('hidden');
            renderTeamsList();
        }

        function unlockTeams() {
            if(confirm("Modifier équipes ?")) {
                isTeamsValidated = false;
                document.getElementById('team-edit-area').classList.remove('hidden');
                document.getElementById('team-game-controls').classList.add('hidden');
                document.getElementById('overlay-config').classList.remove('hidden');
                renderTeamsList();
            }
        }

        function nextTurn() {
            if(!isTeamsValidated || teams.length === 0) return;
            let next = activeTeamIndex + snakeDirection;
            if(next >= teams.length) { next = teams.length - 1; snakeDirection = -1; }
            else if (next < 0) { next = 0; snakeDirection = 1; }
            activeTeamIndex = next;
            renderTeamsList();
            // Afficher la direction du serpent
            document.getElementById('snake-dir-display').textContent = snakeDirection === 1 ? '→' : '←';
        }

        function undoLastScore() {
            if (!lastScoreAction) return;
            teams[lastScoreAction.teamIndex].score -= lastScoreAction.delta;
            addLog(`↩ Score annulé : ${lastScoreAction.teamName} ${lastScoreAction.delta > 0 ? '-' : '+'}${Math.abs(lastScoreAction.delta)}`, 'edit');
            lastScoreAction = null;
            document.getElementById('btn-undo-score').disabled = true;
            renderTeamsList();
        }
        function prevTurn() {
            activeTeamIndex--;
            if(activeTeamIndex < 0) activeTeamIndex = teams.length - 1;
            renderTeamsList();
        }

        // --- COMMUNICATION ---
        function send(type, data={}) { channel.postMessage({ type: type, ...data }); }

        function setMode(mode) {
            ['normal','quick','hard'].forEach(m => document.getElementById(`mode-${m}`).style.borderColor = '#555');
            document.getElementById(`mode-${mode.toLowerCase()}`).style.borderColor = '#f1c40f';
            
            send('SET_MODE', {mode: mode});
            document.getElementById('overlay-launch').classList.add('hidden');
            document.getElementById('grid-container').innerHTML = '';
            document.getElementById('overlay-grid').classList.remove('hidden');
            document.getElementById('overlay-grid').innerText = "Mode changé. Lancez la grille.";
            bucketsMap = {};
        }

        channel.onmessage = (e) => {
            const d = e.data;
            if(d.type === 'SYNC_GRID') buildLocalGrid(d.grid);
            // Si l'écran renvoie une nouvelle question (REROLL)
            if(d.type === 'UPDATED_BUCKET_DATA') {
                updateBucketData(d.bucketId, d.qData);
            }
        };

        function buildLocalGrid(gridData) {
            bucketsMap = {};
            const container = document.getElementById('grid-container');
            container.innerHTML = "";
            document.getElementById('overlay-grid').classList.add('hidden');
            document.getElementById('grid-status').innerText = `(${gridData.length} cases)`;

            gridData.forEach(item => {
                bucketsMap[item.id] = item;
                const btn = document.createElement('div');
                btn.className = `grid-cell ${item.theme === 'HARDCORE' || item.display === '??' ? 'mystery' : ''}`;
                btn.id = `regie-${item.id}`;
                btn.onclick = () => tryOpenBucket(item.id);
                btn.innerHTML = `<div class="cell-theme">${item.theme.substring(0,10)}</div><div class="cell-points">${item.display}</div>`;
                container.appendChild(btn);
            });
        }

        // --- JEU ---
        function tryOpenBucket(id) {
            if(!isTeamsValidated) return alert("Validez les équipes !");
            if(isAnimating) return alert("Animation en cours...");
            if(currentBucketId) return alert("Question déjà ouverte !");
            
            const btn = document.getElementById(`regie-${id}`);
            if(btn.classList.contains('used')) return;

            currentBucketId = id;
            btn.classList.add('selected');
            
            // UI
            const data = bucketsMap[id];
            document.getElementById('question-panel').style.display = 'block';
            document.getElementById('q-text-display').innerText = data.qData.question;
            document.getElementById('a-text-display').innerText = data.qData.answer;
            
            document.getElementById('btn-reveal').disabled = false;
            document.getElementById('btn-true').disabled = true;
            document.getElementById('btn-false').disabled = true;

            send('OPEN_BUCKET', { bucketId: id });
        }

        // --- NOUVEAU : REROLL ---
        function rerollQuestion() {
            if(!currentBucketId) return;
            if(confirm("Changer la question pour ce bucket ? (Irréversible)")) {
                const b = bucketsMap[currentBucketId];
                send('REROLL_BUCKET', { bucketId: currentBucketId, theme: b.theme, level: b.level });
                addLog(`Reroll question demandé pour ${b.theme}`, 'edit');
            }
        }

        function updateBucketData(id, newQData) {
            if(bucketsMap[id]) {
                bucketsMap[id].qData = newQData;
                // Si c'est la question ouverte, on met à jour l'affichage
                if(currentBucketId === id) {
                    document.getElementById('q-text-display').innerText = newQData.question;
                    document.getElementById('a-text-display').innerText = newQData.answer;
                    // On reset les boutons car nouvelle question
                    document.getElementById('btn-reveal').disabled = false;
                    document.getElementById('btn-true').disabled = true;
                    document.getElementById('btn-false').disabled = true;
                }
            }
        }

        function revealAnswer() {
            send('REVEAL_ANSWER');
            document.getElementById('btn-reveal').disabled = true;
            document.getElementById('btn-true').disabled = false;
            document.getElementById('btn-false').disabled = false;
        }

        function validate(isWin) {
            if(!currentBucketId) return;
            const pts = bucketsMap[currentBucketId].level;
            const team = teams[activeTeamIndex];
            const delta = isWin ? pts : -pts;

            // Sauvegarder l'action pour pouvoir l'annuler
            lastScoreAction = { teamIndex: activeTeamIndex, delta, teamName: team.name };
            document.getElementById('btn-undo-score').disabled = false;

            if(isWin) {
                team.score += pts;
                send('ANIM_WIN', {points: pts});
                addLog(`${team.name} : +${pts} (Vrai)`, 'good');
            } else {
                team.score -= pts;
                send('ANIM_LOSE', {points: pts});
                addLog(`${team.name} : -${pts} (Faux)`, 'bad');
            }

            document.getElementById(`regie-${currentBucketId}`).classList.remove('selected');
            document.getElementById(`regie-${currentBucketId}`).classList.add('used');
            
            // Animation Lock 4s
            isAnimating = true;
            document.getElementById('overlay-grid').classList.remove('hidden');
            document.getElementById('overlay-grid').innerText = "Animation...";
            setTimeout(() => { isAnimating = false; document.getElementById('overlay-grid').classList.add('hidden'); }, 4000);

            closeQuestionPanel();
            nextTurn();
        }

        function cancelQuestion() {
            send('CLOSE_QUESTION');
            if(currentBucketId) document.getElementById(`regie-${currentBucketId}`).classList.remove('selected');
            closeQuestionPanel();
            addLog("Question annulée", 'edit');
        }

        function closeQuestionPanel() {
            currentBucketId = null;
            document.getElementById('question-panel').style.display = 'none';
            renderTeamsList(); 
        }

        function sendScores() {
            if(currentBucketId) return alert("Fermez la question d'abord");
            send('SHOW_SCORES_FINAL', {teams: teams});
        }

        renderTeamsList();
    </script>
</body>
</html>
