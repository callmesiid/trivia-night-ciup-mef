<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LA SURENCHÈRE — ÉCRAN</title>
    <link rel="stylesheet" href="style_surenchere.css">
    <style>
        /* ══ NOUVEAU GÉNÉRIQUE ══════════════════════════════════════ */

        /* Flash écran (coup de marteau) */
        #flash-el {
            position: fixed; inset: 0; background: #fff;
            opacity: 0; pointer-events: none; z-index: 9990;
        }
        #flash-el.flash { animation: screenFlash .35s ease-out forwards; }
        @keyframes screenFlash { 0%{opacity:.8;} 100%{opacity:0;} }

        /* Marteau */
        #gavel-el {
            position: absolute; font-size: 9rem; opacity: 0; z-index: 10;
            transform-origin: 20% 80%;
            filter: drop-shadow(4px 4px 0 #000);
            /* légèrement au-dessus du centre */
            margin-bottom: 40px;
        }
        #gavel-el.strike {
            animation: gavelStrike .32s cubic-bezier(0.15, 0, 0.1, 1) forwards;
        }
        #gavel-el.recoil {
            animation: gavelRecoil .25s ease-out forwards;
        }
        @keyframes gavelStrike {
            0%  { opacity: 0; transform: rotate(-75deg) translateY(-90px) scale(1.2); }
            40% { opacity: 1; transform: rotate(18deg)  translateY(6px)   scale(1); }
            70% { opacity: 1; transform: rotate(-8deg)  translateY(-8px); }
            100%{ opacity: 1; transform: rotate(0deg)   translateY(0); }
        }
        @keyframes gavelRecoil {
            0%  { opacity: 1; transform: rotate(0deg) translateY(0); }
            100%{ opacity: 0; transform: rotate(-55deg) translateY(-70px) scale(.9); }
        }

        /* Bloc de juge (dessous marteau) */
        #gavel-block {
            position: absolute;
            width: 160px; height: 28px;
            background: linear-gradient(to bottom, #8b6914, #5a3f00);
            border-radius: 6px; margin-top: 90px;
            box-shadow: 0 6px 0 #3a2700, 0 0 20px rgba(0,0,0,.6);
            opacity: 0;
        }
        #gavel-block.show { opacity: 1; }

        /* Logo structure — "LA" + "SURENCHÈRE" (style Le Risque Tout) */
        .title-logo-wrapper {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; position: relative; user-select: none;
        }
        .title-la {
            font-family: 'Anton', sans-serif;
            font-size: 4.5rem; color: #d4af37;
            text-shadow: 3px 3px 0 #000, 0 0 30px rgba(212,175,55,.4);
            transform: rotate(-12deg);
            align-self: flex-start; margin-left: 30px;
            margin-bottom: -18px; line-height: 1;
        }
        .title-main {
            font-family: 'Anton', sans-serif;
            font-size: clamp(5rem, 10vw, 10rem);
            color: #fff; line-height: 1; letter-spacing: -2px;
            text-shadow: 6px 6px 0 #000, 0 0 50px rgba(231,76,60,.25);
        }

        /* Phase 1 : tombe depuis le haut */
        .title-logo-wrapper.title-drop {
            opacity: 1;
            animation: titleFall .75s cubic-bezier(0.2, 1.4, 0.4, 1) forwards;
        }
        @keyframes titleFall {
            0%   { transform: translateY(-110vh); opacity: 0; }
            65%  { transform: translateY(14px);   opacity: 1; }
            80%  { transform: translateY(-7px);   }
            100% { transform: translateY(0);      opacity: 1; }
        }

        /* Phase 2 : zoom (identique superBounce de Le Risque Tout) */
        .title-logo-wrapper.title-zoom {
            animation: titleSuperBounce 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes titleSuperBounce {
            0%  { transform: scale(1); opacity: 1; }
            30% { transform: scale(1.65); opacity: 1; }
            60% { transform: scale(1.45); opacity: 1; }
            100%{ transform: scale(1.55); opacity: 1; }
        }

        /* Phase finale : scintillement rouge (casino) */
        .title-logo-wrapper.title-flicker .title-main {
            animation: flickerRed 2s infinite;
            color: #e74c3c;
            text-shadow: 4px 4px 0 #000, 0 0 30px #c0392b;
        }
        @keyframes flickerRed {
            0%,18%,22%,25%,53%,57%,100% { opacity:1; text-shadow:0 0 30px #e74c3c,0 0 60px #e74c3c,4px 4px 0 #000; }
            20%,24%,55% { opacity:.1; text-shadow:none; }
        }

        /* ── Notification Bonus / Malus sur écran ── */
        .effect-notif {
            position: fixed; top: 80px; right: -500px; z-index: 3500;
            border-radius: 12px; padding: 16px 22px; min-width: 260px;
            transition: right .5s cubic-bezier(.2,1,.4,1); text-align: center;
        }
        .effect-notif.bonus { background: linear-gradient(135deg,#1a2a5a,#2980b9); border: 3px solid #2980b9; }
        .effect-notif.malus { background: linear-gradient(135deg,#3a0a0a,#c0392b); border: 3px solid #c0392b; }
        .effect-notif.show  { right: 20px; }
        .effect-emoji { font-size: 2.5rem; }
        .effect-name  { font-family: 'Anton'; font-size: 1.4rem; color: #fff; }
        .effect-team  { font-family: 'Roboto'; font-size: .8rem; color: rgba(255,255,255,.7); margin-top: 4px; }

        /* ══ FIN NOUVEAU GÉNÉRIQUE ══════════════════════════════════ */

        /* ── SCORES ÉQUIPES (header) ── */
        #teams-header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 3100;
            display: none; align-items: center; justify-content: center;
            gap: 20px; padding: 6px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }
        .team-score-chip {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.7); border: 2px solid #333;
            border-radius: 8px; padding: 5px 14px;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
            transition: border-color .3s, background .3s;
        }
        .team-score-chip.playing { border-color: #d4af37; background: rgba(30,20,0,0.85); }
        .team-chip-dot  { width: 12px; height: 12px; border-radius: 50%; }
        .team-chip-name { color: #fff; }
        .team-chip-pts  { color: #d4af37; font-weight: bold; font-size: 1.2rem; margin-left: 6px; }
        .team-playing-badge {
            font-size: .65rem; color: #f39c12; display: block; line-height: 1;
        }

        /* ── SCORE LIVE (during game) ── */
        .score-display {
            font-size: 2.8rem; color: #2ecc71; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 10px 30px; border-radius: 10px;
            border: 2px solid #2ecc71; transition: transform .15s;
        }

        /* ── REVEAL GRID amélioré ── */
        .reveal-item {
            background: #111; border: 1px solid #2a2a2a; color: #444;
            padding: 10px 8px; font-size: .95rem; font-family: 'Bebas Neue', sans-serif;
            text-align: center; border-radius: 6px;
            transition: all 0.3s ease; opacity: 0; transform: scale(0.8);
        }
        .reveal-item.visible { opacity: 1; transform: scale(1); }
        .reveal-item.correct {
            background: #1a5a2a; color: #a8e6b8; border-color: #27ae60;
            box-shadow: 0 0 12px rgba(46,204,113,0.4);
        }
        .reveal-item.correct.visible {
            animation: popIn .4s cubic-bezier(.2,1.5,.4,1);
        }
        @keyframes popIn { 0%{transform:scale(.6);opacity:0;} 60%{transform:scale(1.08);} 100%{transform:scale(1);opacity:1;} }

        /* ── REVEAL HEADER ── */
        #reveal-header {
            display: flex; align-items: center; justify-content: space-between;
            width: 90%; margin-bottom: 20px; max-width: 1400px;
        }
        #reveal-title { font-family: 'Anton', sans-serif; font-size: 2.5rem; color: #fff; letter-spacing: 3px; }
        #reveal-score-badge {
            background: #2ecc71; color: #000; font-family: 'Anton', sans-serif;
            font-size: 1.8rem; padding: 6px 20px; border-radius: 8px;
        }

        /* ── SCORE PODIUM ── */
        #scores-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0a30 0%, #000 100%);
            z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }
        #scores-screen.show { display: flex; }
        #scores-screen h1 { font-family: 'Anton'; font-size: 4rem; color: #d4af37; letter-spacing: 5px; text-shadow: 0 0 30px rgba(212,175,55,0.4); }
        .podium-row { display: flex; align-items: center; gap: 20px; background: #1a1a2e; border-radius: 10px; padding: 14px 28px; min-width: 500px; border: 2px solid #2a2a4a; }
        .podium-rank { font-family: 'Anton'; font-size: 2rem; color: #555; min-width: 50px; }
        .podium-row:nth-child(2) .podium-rank { color: #ffd700; }
        .podium-row:nth-child(3) .podium-rank { color: #c0c0c0; }
        .podium-row:nth-child(4) .podium-rank { color: #cd7f32; }
        .podium-dot  { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; }
        .podium-name { font-family: 'Anton'; font-size: 1.5rem; flex: 1; color: #fff; }
        .podium-pts  { font-family: 'Anton'; font-size: 2rem; color: #d4af37; }
    </style>
</head>
<body>

<!-- Scores équipes en header -->
<div id="teams-header"></div>

<!-- Flash overlay (coup de marteau) -->
<div id="flash-el"></div>

<!-- Intro -->
<div id="intro-screen">
    <!-- Marteau de juge -->
    <div id="gavel-el">🔨</div>

    <!-- Bloc où le marteau frappe -->
    <div id="gavel-block"></div>

    <!-- Logo "LA SURENCHÈRE" -->
    <div class="title-logo-wrapper" id="title-logo">
        <div class="title-la">LA</div>
        <div class="title-main">SURENCHÈRE</div>
    </div>
</div>

<!-- Slot machine -->
<div id="selector-screen">
    <div style="font-family:'Anton';font-size:2rem;margin-bottom:20px;color:#888;letter-spacing:3px;">SÉLECTION DU THÈME</div>
    <div class="slot-machine-container">
        <div class="slot-reel" id="slot-reel"></div>
    </div>
</div>

<!-- Jeu -->
<div id="game-screen">
    <div class="theme-header" id="game-theme-title">THÈME</div>
    <div class="question-display" id="game-question">PRÊT ?</div>
    <div class="counters-area">
        <div style="display:flex;flex-direction:column;gap:10px;">
            <div class="score-display">RÉPONSES : <span id="score-val">0</span><span id="score-total" style="color:#555;font-size:.6em;"> / ?</span></div>
            <div id="mise-display-game" style="font-family:'Bebas Neue';font-size:1.8rem;color:#8e44ad;background:rgba(0,0,0,.5);padding:6px 18px;border-radius:8px;border:2px solid #8e44ad;"></div>
        </div>
        <div class="timer-display" id="timer-val">30</div>
    </div>
</div>

<!-- Notification bonus/malus écran -->
<div id="bonus-notif-screen" class="effect-notif"></div>

<!-- Révélation -->
<div id="reveal-overlay">
    <div id="reveal-header">
        <div id="reveal-title">LES RÉPONSES</div>
        <div id="reveal-score-badge">0 / 0 trouvées</div>
    </div>
    <div class="reveal-grid-container" id="reveal-grid"></div>
</div>

<!-- Podium -->
<div id="scores-screen">
    <h1>CLASSEMENT</h1>
    <div id="podium-list"></div>
</div>

<div id="game-footer">
    INSPIRÉ DE <img src="images_front/popcorn.png" alt="Popcorn">
</div>

<script src="surenchere_data.js"></script>
<script>
const channel = new BroadcastChannel('surenchere_channel');

const introScreen    = document.getElementById('intro-screen');
const selectorScreen = document.getElementById('selector-screen');
const gameScreen     = document.getElementById('game-screen');
const revealOverlay  = document.getElementById('reveal-overlay');
const revealGrid     = document.getElementById('reveal-grid');
const slotReel       = document.getElementById('slot-reel');
const timerEl        = document.getElementById('timer-val');
const teamsHeader    = document.getElementById('teams-header');

const audioIntro  = new Audio('effets_sonores/intro.mp3');
const audioBreak  = new Audio('effets_sonores/break.mp3');
const audioSpin   = new Audio('effets_sonores/spin.mp3');
const audioTimer  = new Audio('effets_sonores/timer.mp3');
const audioReveal = new Audio('effets_sonores/reveal.mp3');
const audioWin    = new Audio('effets_sonores/selected.mp3');
let currentFx = null;

// Éléments du nouveau générique
const gavelEl  = document.getElementById('gavel-el');
const gavelBlk = document.getElementById('gavel-block');
const titleLogo= document.getElementById('title-logo');
const flashEl  = document.getElementById('flash-el');

let timerInterval, spinInterval;
let currentTime = 30;
let introTimeouts = [];

// ── TEAMS ──
let teamsData = [];
let playingIdx = -1;

function renderTeamsHeader() {
    teamsHeader.innerHTML = '';
    if (!teamsData.length) { teamsHeader.style.display = 'none'; return; }
    teamsHeader.style.display = 'flex';
    teamsData.forEach((t, i) => {
        const chip = document.createElement('div');
        chip.className = 'team-score-chip' + (i === playingIdx ? ' playing' : '');
        chip.innerHTML = `
            <div class="team-chip-dot" style="background:${t.color}"></div>
            <div>
                ${i===playingIdx?'<span class="team-playing-badge">▶ EN JEU</span>':''}
                <span class="team-chip-name">${t.name}</span>
                <span class="team-chip-pts">${t.score}</span>
            </div>`;
        teamsHeader.appendChild(chip);
    });
}

// ── CHANNEL ──
channel.onmessage = (event) => {
    const data = event.data;
    switch(data.type) {
        case 'PLAY_INTRO':      runIntro(); break;
        case 'SKIP_INTRO':      skipIntro(); break;
        case 'RESET_TO_LOGO':   showStaticLogo(); break;
        case 'START_SPIN':      runSpin(data.availableThemes); break;
        case 'REVEAL_THEME':    stopSpin(data.theme); break;
        case 'SHOW_QUESTION':   setupGame(data.theme, data.mise); break;
        case 'SHOW_BONUS':      showEffect(data.bonus, data.teamName, false); break;
        case 'SHOW_MALUS':      showEffect(data.malus, data.byTeam,  true);  break;
        case 'UPDATE_SCORE':
            document.getElementById('score-val').textContent = data.count;
            if (data.total) document.getElementById('score-total').textContent = ` / ${data.total}`;
            const sc = document.querySelector('.score-display');
            sc.style.transform = 'scale(1.15)';
            setTimeout(() => sc.style.transform = 'scale(1)', 200);
            break;
        case 'UPDATE_TEAMS':
            teamsData = data.teams || [];
            playingIdx = data.playingIdx ?? -1;
            renderTeamsHeader();
            break;
        case 'START_TIMER':     runTimer(data.duration || 30); break;
        case 'PAUSE_TIMER':     pauseTimer(); break;
        case 'RESET_TIMER':     resetTimer(); break;
        case 'SHOW_ALL_ANSWERS': showRevealGrid(data.answers, data.validatedIndices, data.total); break;
        case 'HIDE_ALL_ANSWERS': revealOverlay.style.display = 'none'; break;
        case 'PLAY_FX':         playFxSound(data.soundFile); break;
        case 'SHOW_SCORES':     showScoreScreen(data.teams); break;
    }
};

// ── INTRO ──
function clearIntro() {
    introTimeouts.forEach(t => clearTimeout(t));
    introTimeouts = [];
    audioIntro.pause(); audioIntro.currentTime = 0;
    // Reset tous les éléments génériques
    gavelEl.className  = ''; gavelEl.style.opacity = '0';
    gavelBlk.className = '';
    titleLogo.className= 'title-logo-wrapper';
    titleLogo.style.opacity = '0';
    flashEl.className  = '';
}

function flash() {
    flashEl.className = '';
    void flashEl.offsetWidth;
    flashEl.classList.add('flash');
}

function gavelHit(n) {
    // Animer le marteau : recoil → strike
    gavelEl.className = '';
    gavelBlk.classList.add('show');
    void gavelEl.offsetWidth;
    gavelEl.classList.add('strike');
    flash();
    // Son de marteau
    const snd = new Audio('effets_sonores/break.mp3');
    snd.volume = .9; snd.play();
}

function showStaticLogo() {
    clearIntro();
    introScreen.style.display = 'flex'; selectorScreen.style.display = 'none';
    gameScreen.style.display = 'none'; revealOverlay.style.display = 'none';
    document.getElementById('scores-screen').classList.remove('show');
    // Logo statique avec scintillement rouge
    titleLogo.style.opacity = '1';
    titleLogo.className = 'title-logo-wrapper title-flicker';
    // Volume de fond
    audioIntro.volume = .4; audioIntro.loop = true;
    if (audioIntro.paused) audioIntro.play();
}

function skipIntro() { showStaticLogo(); }

function runIntro() {
    clearIntro();
    introScreen.style.display = 'flex'; selectorScreen.style.display = 'none';
    gameScreen.style.display  = 'none'; revealOverlay.style.display  = 'none';
    document.getElementById('scores-screen').classList.remove('show');

    // ─── SÉQUENCE GÉNÉRIQUE ───────────────────────────────────
    // 0.6s : PREMIER COUP DE MARTEAU
    let t1 = setTimeout(() => gavelHit(1), 600);

    // 1.0s : recoil du marteau
    let t2 = setTimeout(() => {
        gavelEl.className = 'recoil';
    }, 1000);

    // 1.7s : DEUXIÈME COUP DE MARTEAU
    let t3 = setTimeout(() => gavelHit(2), 1700);

    // 2.1s : recoil final + marteau disparaît
    let t4 = setTimeout(() => {
        gavelEl.className = 'recoil';
        gavelBlk.className = '';
    }, 2100);

    // 2.6s : "LA SURENCHÈRE" tombe depuis le haut
    let t5 = setTimeout(() => {
        titleLogo.style.opacity = '1';
        titleLogo.className = 'title-logo-wrapper title-drop';
    }, 2600);

    // 3.5s : ZOOM (style superBounce Le Risque Tout)
    let t6 = setTimeout(() => {
        titleLogo.className = 'title-logo-wrapper'; // reset
        void titleLogo.offsetWidth;
        titleLogo.className = 'title-logo-wrapper title-zoom';
    }, 3500);

    // 5.2s : scintillement rouge + musique
    let t7 = setTimeout(() => {
        titleLogo.className = 'title-logo-wrapper title-zoom title-flicker';
        audioIntro.volume = .6; audioIntro.play();
    }, 5200);

    introTimeouts.push(t1, t2, t3, t4, t5, t6, t7);
}

// ── SPIN ──
function runSpin(themes) {
    introScreen.style.display = 'none'; selectorScreen.style.display = 'flex';
    slotReel.innerHTML = '';
    let spinList = [...themes, ...themes, ...themes, ...themes];
    spinList.forEach(t => {
        const item = document.createElement('div');
        item.className = 'slot-item';
        item.innerHTML = `<img src="${t.icon}" onerror="this.style.display='none'">${t.title}`;
        slotReel.appendChild(item);
    });
    audioSpin.currentTime = 0; audioSpin.loop = true; audioSpin.play();
    let offset = 0;
    if (spinInterval) clearInterval(spinInterval);
    spinInterval = setInterval(() => {
        offset -= 80;
        if (offset < -1600) offset = 0;
        slotReel.style.transform = `translateY(${offset}px)`;
    }, 16);
}

function stopSpin(selectedTheme) {
    clearInterval(spinInterval); audioSpin.pause();
    slotReel.innerHTML = '';
    const winItem = document.createElement('div');
    winItem.className = 'slot-item';
    winItem.style.cssText = 'background:#27ae60;color:#fff;font-size:3.5rem;';
    winItem.innerHTML = `<img src="${selectedTheme.icon}" onerror="this.style.display='none'">${selectedTheme.title}`;
    slotReel.appendChild(winItem); slotReel.style.transform = 'translateY(0)';
    audioWin.play();
}

// ── JEU ──
function setupGame(theme, mise) {
    selectorScreen.style.display = 'none'; gameScreen.style.display = 'flex';
    document.getElementById('game-theme-title').textContent = theme.title;
    document.getElementById('game-question').textContent = theme.question;
    document.getElementById('score-val').textContent = '0';
    document.getElementById('score-total').textContent = ` / ${theme.answers.length}`;
    // Afficher la mise si elle est définie
    const miseEl = document.getElementById('mise-display-game');
    if (miseEl) { miseEl.textContent = mise > 0 ? `MISE : ${mise}` : ''; }
    resetTimerUI();
}

// Notification bonus/malus sur l'écran
function showEffect(def, teamName, isMalus) {
    // Réutiliser un overlay léger
    const n = document.getElementById('bonus-notif-screen');
    if (!n) return;
    n.innerHTML = `<div class="effect-emoji">${def.emoji}</div><div class="effect-name">${def.name}</div><div class="effect-team">${isMalus?'MALUS':'BONUS'} · ${teamName}</div>`;
    n.className = isMalus ? 'effect-notif malus show' : 'effect-notif bonus show';
    setTimeout(() => n.classList.remove('show'), 4000);
    new Audio('effets_sonores/selected.mp3').play().catch(()=>{});
}

// ── TIMER ──
function runTimer(duration) {
    currentTime = duration || 30;
    audioTimer.currentTime = 0; audioTimer.play();
    timerEl.textContent = currentTime; timerEl.style.color = '#D60000';
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        currentTime--;
        timerEl.textContent = currentTime;
        timerEl.style.color = currentTime <= 5 ? '#fff' : '#D60000';
        if (currentTime <= 0) {
            clearInterval(timerInterval); currentTime = 0;
            timerEl.textContent = '0'; audioTimer.pause();
            new Audio('effets_sonores/break.mp3').play();
        }
    }, 1000);
}
function pauseTimer() { if (timerInterval) clearInterval(timerInterval); audioTimer.pause(); }
function resetTimer() { if (timerInterval) clearInterval(timerInterval); audioTimer.pause(); audioTimer.currentTime = 0; resetTimerUI(); }
function resetTimerUI() { currentTime = 30; timerEl.textContent = '30'; timerEl.style.color = '#D60000'; }

// ── RÉVÉLATION animée ──
function showRevealGrid(answers, validatedIndices, total) {
    if (timerInterval) clearInterval(timerInterval);
    audioTimer.pause();
    audioReveal.play();

    revealOverlay.style.display = 'flex';
    revealGrid.innerHTML = '';

    const found = validatedIndices.length;
    const tot   = total || answers.length;
    document.getElementById('reveal-score-badge').textContent = `${found} / ${tot} trouvées`;

    const items = [];
    answers.forEach((ans, index) => {
        const div = document.createElement('div');
        div.className = 'reveal-item' + (validatedIndices.includes(index) ? ' correct' : '');
        div.textContent = ans;
        revealGrid.appendChild(div);
        items.push(div);
    });

    // Apparition échelonnée
    const DELAY_STEP = Math.min(80, 1200 / items.length);
    items.forEach((el, i) => {
        setTimeout(() => {
            el.classList.add('visible');
            if (el.classList.contains('correct') && i % 3 === 0) {
                new Audio('effets_sonores/selected.mp3').play();
            }
        }, i * DELAY_STEP + 200);
    });
}

// ── SCORE SCREEN ──
function showScoreScreen(teams) {
    const screen = document.getElementById('scores-screen');
    const list   = document.getElementById('podium-list');
    list.innerHTML = '';
    const sorted = [...teams].sort((a,b) => b.score - a.score);
    sorted.forEach((t, i) => {
        const row = document.createElement('div');
        row.className = 'podium-row';
        row.innerHTML = `<div class="podium-rank">#${i+1}</div><div class="podium-dot" style="background:${t.color}"></div><div class="podium-name">${t.name}</div><div class="podium-pts">${t.score} pts</div>`;
        list.appendChild(row);
        setTimeout(() => row.style.opacity='1', i * 400 + 300);
        row.style.opacity = '0'; row.style.transition = 'opacity .5s';
    });
    screen.classList.add('show');
}

// ── FX ──
function playFxSound(file) {
    if (currentFx) { currentFx.pause(); currentFx.currentTime = 0; }
    currentFx = new Audio(file); currentFx.play();
}
</script>
